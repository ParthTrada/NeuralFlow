        <!-- Structured Data - FAQPage for AI understanding -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "FAQPage",
            "mainEntity": [
                {
                    "@type": "Question",
                    "name": "What is NeuralFlows?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "NeuralFlows is a free visual neural network builder that allows you to design deep learning models using a drag-and-drop interface. It automatically generates PyTorch code and lets you train models directly in your browser without any coding required."
                    }
                },
                {
                    "@type": "Question",
                    "name": "Is NeuralFlows free to use?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Yes, NeuralFlows is completely free to use. You can design, train, and export neural networks without any cost. Sign in with Google to save and share your models."
                    }
                },
                {
                    "@type": "Question",
                    "name": "Do I need coding experience to use NeuralFlows?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "No coding experience is required. NeuralFlows is designed for both beginners and experts. Simply drag and drop layers to build your network, and the platform automatically generates production-ready PyTorch code for you."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What types of neural networks can I build with NeuralFlows?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "You can build various neural network architectures including: Multi-Layer Perceptrons (MLP) for tabular data, Convolutional Neural Networks (CNN) for image classification, Recurrent Neural Networks (RNN/LSTM/GRU) for sequences, Transformers with attention mechanisms for NLP, and Autoencoders for unsupervised learning."
                    }
                },
                {
                    "@type": "Question",
                    "name": "Can I train models in NeuralFlows?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Yes, NeuralFlows supports in-browser training using TensorFlow.js. You can upload your dataset, configure training parameters, and train your model directly in the browser. Watch real-time training metrics and loss curves as your model learns."
                    }
                },
                {
                    "@type": "Question",
                    "name": "How do I export my neural network code?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Click the 'Generate Code' button to view the automatically generated PyTorch code. You can then download the code as a .py file ready to use in your projects. The code includes all necessary imports, model class definition, and forward pass logic."
                    }
                },
                {
                    "@type": "Question",
                    "name": "Can I share my neural network designs?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Yes, after signing in with Google, you can save your models and generate shareable links. Anyone with the link can view and clone your neural network design to use as a starting point for their own projects."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What layer types are available in NeuralFlows?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "NeuralFlows supports a wide range of layer types including: Input, Dense/Linear, Conv2D, MaxPool2D, Dropout, Flatten, BatchNorm, LayerNorm, LSTM, GRU, Multi-Head Attention, Transformer Encoder, Transformer Decoder, Embedding, and Output layers."
                    }
                }
            ]
        }
        </script>
