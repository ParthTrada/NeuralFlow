<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Neural Network Visualization on right side -->
  <g transform="translate(750, 150)">
    <!-- Input layer -->
    <circle cx="50" cy="50" r="25" fill="url(#accentGrad)" opacity="0.8"/>
    <circle cx="50" cy="130" r="25" fill="url(#accentGrad)" opacity="0.8"/>
    <circle cx="50" cy="210" r="25" fill="url(#accentGrad)" opacity="0.8"/>
    
    <!-- Hidden layer 1 -->
    <circle cx="180" cy="70" r="25" fill="#22c55e" opacity="0.8"/>
    <circle cx="180" cy="150" r="25" fill="#22c55e" opacity="0.8"/>
    <circle cx="180" cy="230" r="25" fill="#22c55e" opacity="0.8"/>
    
    <!-- Hidden layer 2 -->
    <circle cx="310" cy="110" r="25" fill="#f59e0b" opacity="0.8"/>
    <circle cx="310" cy="190" r="25" fill="#f59e0b" opacity="0.8"/>
    
    <!-- Output -->
    <circle cx="420" cy="150" r="30" fill="#ec4899" opacity="0.9"/>
    
    <!-- Connections -->
    <g stroke="white" stroke-width="2" opacity="0.3">
      <!-- Input to Hidden 1 -->
      <line x1="75" y1="50" x2="155" y2="70"/>
      <line x1="75" y1="50" x2="155" y2="150"/>
      <line x1="75" y1="130" x2="155" y2="70"/>
      <line x1="75" y1="130" x2="155" y2="150"/>
      <line x1="75" y1="130" x2="155" y2="230"/>
      <line x1="75" y1="210" x2="155" y2="150"/>
      <line x1="75" y1="210" x2="155" y2="230"/>
      
      <!-- Hidden 1 to Hidden 2 -->
      <line x1="205" y1="70" x2="285" y2="110"/>
      <line x1="205" y1="70" x2="285" y2="190"/>
      <line x1="205" y1="150" x2="285" y2="110"/>
      <line x1="205" y1="150" x2="285" y2="190"/>
      <line x1="205" y1="230" x2="285" y2="110"/>
      <line x1="205" y1="230" x2="285" y2="190"/>
      
      <!-- Hidden 2 to Output -->
      <line x1="335" y1="110" x2="390" y2="150"/>
      <line x1="335" y1="190" x2="390" y2="150"/>
    </g>
  </g>
  
  <!-- Logo/Icon -->
  <g transform="translate(80, 200)">
    <circle cx="40" cy="40" r="35" fill="url(#accentGrad)"/>
    <circle cx="20" cy="25" r="6" fill="white" opacity="0.9"/>
    <circle cx="20" cy="55" r="6" fill="white" opacity="0.9"/>
    <circle cx="40" cy="30" r="6" fill="white" opacity="0.9"/>
    <circle cx="40" cy="50" r="6" fill="white" opacity="0.9"/>
    <circle cx="60" cy="40" r="6" fill="white" opacity="0.9"/>
    <line x1="26" y1="25" x2="34" y2="30" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="26" y1="55" x2="34" y2="50" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="46" y1="30" x2="54" y2="40" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="46" y1="50" x2="54" y2="40" stroke="white" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white">
    NeuralFlows
  </text>
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a1a1aa">
    Visual Neural Network Builder
  </text>
  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#71717a">
    Design • Train • Export PyTorch Code
  </text>
  
  <!-- Features badges -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#8b5cf6" opacity="0.2"/>
    <text x="70" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle">Drag & Drop</text>
    
    <rect x="160" y="0" width="120" height="36" rx="18" fill="#22c55e" opacity="0.2"/>
    <text x="220" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#86efac" text-anchor="middle">PyTorch</text>
    
    <rect x="300" y="0" width="140" height="36" rx="18" fill="#f59e0b" opacity="0.2"/>
    <text x="370" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#fcd34d" text-anchor="middle">Train in Browser</text>
  </g>
</svg>
